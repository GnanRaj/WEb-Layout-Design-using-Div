<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <style>
	
        *{
            font-style:italic;
            font-size:20px;
            text-align:center;
        }
        .head{
            margin-bottom:3px;
            border-style:solid;
            border-bottom-style:dashed;
            border-width:1px;
            padding:20px;
            background-color:rgb(145, 17, 34);

        }

        .footer
        {
            border-style:solid;
            border-top-style:dashed;
            border-width:1px;
            padding:10px;
            background-color:gray;
        }

        .nav{
            border-style:solid;
            border-top-style:dashed;
            border-bottom-style:dashed;
            padding:10px;
            border-width:1px;
            margin-bottom:3px;
            background-color:rgb(181, 83, 22);
        }
        
        .middle{
            display:flex;
            height:430px;
        }

        .content1,.content2{
            width:20%;
            justify-items: center;
            align-content: center;
            margin-bottom:3px;
            
        }

        .main{
            width:60%;
            justify-items: center;
            align-content: center;
            border-style:dashed;
            border-width:1px;
            margin:0px 3px 3px 3px;
            background-image:linear-gradient(120deg,blueviolet,rgb(22, 220, 22));
        }

        .content1{
            border-style:dashed;
            border-left-style:solid;
            border-bottom-style:dashed;
            padding:10px;
            border-width:1px;
            background-color:blueviolet
        }

        .content2{
            border-style:dashed;
            border-right-style:solid;
            border-bottom-style:dashed;
            padding:10px;
            border-width:1px;
            background-color:blueviolet;
        }
        .web{
            border-color:lightblue;
            border-style:solid;
            border-width:1px;
        }




    </style>

    //<link rel="stylesheet href="layout_using_div.css">
</head>
<body>
    <div class="web">
    
    <div class="head">Header</div>
    <div class="nav">Navigation Bar</div>
    <div class="middle">
        <div class="content1">Content</div>
        <div class="main">Main Page</div>
        <div class="content2">Content</div>
    </div>
    <div class="footer">Footer Page</div>
    </div>
</body>
</html>
